<html lang="en">
<head>
<meta charset="UTF-8">
<title>Youtub ki tah ho</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{margin:0;font-family:"Roboto","Arial",sans-serif;background:#181818;color:#fff;}
header{background:#000;padding:15px;text-align:center;font-size:1.5rem;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:15px;padding:15px;}
.card{position:relative;overflow:hidden;border-radius:8px;background:#222;}
.card img{width:100%;height:auto;display:block;}
.overlay{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,.6);color:#fff;padding:8px;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;}
.play{font-size:1.4rem;margin-right:8px;}
.video-player{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);justify-content:center;align-items:center;z-index:1000;}
.video-player video{max-width:90%;max-height:90%;}
.close{position:absolute;top:10px;right:15px;font-size:2rem;color:#fff;cursor:pointer;}
@media (max-width:480px){
.card{font-size:.8rem;}
}
</style>
</head>
<body>
<header>Youtub ki tah ho</header>
<div class="grid">
<div class="card" data-video="https://files.catbox.moe/c21axk.mp4">
<img src="https://files.catbox.moe/j0hswu.jpg" alt="thumbnail 1">
<div class="overlay"><span class="play">▶</span><span>Video 1</span></div>
</div>
<div class="card" data-video="https://files.catbox.moe/gt4h6t.mp4">
<img src="https://files.catbox.moe/zx6f7i.jpg" alt="thumbnail 2">
<div class="overlay"><span class="play">▶</span><span>Video 2</span></div>
</div>
</div>
<div class="video-player" id="player"><div class="close">&times;</div><video src="" controls autoplay></video></div>
<script>
const cards=document.querySelectorAll('.card');
const player=document.getElementById('player');
const vid=player.querySelector('video');
cards.forEach(c=>{
c.onclick=()=>{vid.src=c.dataset.video;player.style.display='flex';vid.play();}
});
player.querySelector('.close').onclick=()=>{player.style.display='none';vid.pause();vid.src='';};
</script>
</body>
</html>
